name: telegram-to-rubika-bot

on:
  workflow_dispatch:   # 👈 این همون Start Flow هست
  schedule:
    - cron: "0 * * * *"  # هر 1 ساعت

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Start Flow
        run: echo "Flow started manually or by schedule"

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests telethon rubpy

      - name: 📥 Fetch Telegram messages
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: |
          python telegram_bot.py

      - name: ⏱ Wait 5 seconds
        run: sleep 5

      - name: 📤 Send to Rubika
        env:
          RUBIKA_TOKEN: ${{ secrets.RUBIKA_TOKEN }}
        run: |
          python rubika_bot.py
