name: telegram-to-rubika-bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Start Flow
        run: echo "Flow started manually or by schedule"

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: 📥 Fetch Telegram messages
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: |
          python telegram_bot.py

      - name: 📝 Print data.json content
        run: |
          echo "---- data.json ----"
          cat data.json || echo "data.json not found"

      - name: ❗ Check if data.json is empty
        run: |
          if [ ! -s data.json ]; then
            echo "❗ ERROR: data.json is EMPTY!"
            exit 1
          fi

      - name: ⏱ Wait 5 seconds
        run: sleep 5
